name: Draft a release note
on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  draft_release:
    name: Release Drafter
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Run release-drafter
        uses: release-drafter/release-drafter@v7.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
